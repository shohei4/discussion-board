<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>議題詳細</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
	<!-- ナビバー -->
	<div th:replace="~{common/navbar2 :: main-nav}"></div>
	<div class="container my-5">

		<!-- 議題カード -->
		<div class="card shadow-sm mb-4">
			<div class="card-header">
				<h2>
					議題
				</h2>
			</div>
			<div class="card-body">

				<!-- タイトル -->
				<h2 id="title" class="card-title fw-bold mb-3">
					議題タイトル
				</h2>

				<!-- 本文 -->
				<p id="body" class="card-text fs-5 mb-4">
					本文
				</p>

				<!-- 作成者 -->
				<p class="text-muted mb-4">
					作成者：
					<span id="username" class="fw-semibold"></span>
				</p>

				<!-- 投稿日時 -->
				<p class="text-muted mb-4">
					<span id="date" class="fw-semibold"></span>
				</p>
				<!-- 操作ボタン -->
				<div class="d-flex gap-2">
					<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#commentModal">
						<i class="bi bi-chat-dots"></i> コメント投稿
					</button>
					<a id="EditGidaiLink" class="btn btn-outline-warning">
						<i class="bi bi-pencil-square"></i> 編集
					</a>
				</div>
			</div>
		</div>

		<!-- 議題ID（JS用） -->
		<div id="gidai-data" th:data-gidai-id="${gidaiId}"></div>

		<!-- コメント一覧 -->
		<div class="card shadow-sm">
			<div class="card-header bg-light fw-bold">
				議論コメント
			</div>

			<div id="commentList" class="list-group list-group-flush">
				<!-- JSでコメント追加 -->
			</div>
		</div>
		<a th:href="@{/view/gidai/list}">議題一覧はこちら</a>

	</div>

	<!-- コメント投稿モーダル -->
	<div class="modal fade" id="commentModal" tabindex="-1" aria-labelledby="commentModalLabel" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="commentModalLabel">コメント投稿</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
				</div>
				<div class="modal-body">
					<textarea id="modalComment" class="form-control" rows="3" placeholder="コメントを入力"></textarea>
					<div id="modalMessage" class="text-danger fw-bold mt-2"></div>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
					<button type="button" class="btn btn-primary" id="submitModalComment">投稿</button>
				</div>
			</div>
		</div>
	</div>

	<!-- 返信投稿用モーダル -->
	<div class="modal fade" id="replyModal" tabindex="-1" aria-labelledby="replyModalLabel" aria-hidden="true">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title" id="replyModalLabel">返信投稿</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
				</div>
				<div class="modal-body">
					<textarea id="modalReply" class="form-control" rows="3" placeholder="コメントを入力"></textarea>
					<div id="replyModalMessage" class="text-danger fw-bold mt-2"></div>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
					<button type="button" class="btn btn-primary" id="submitModalReply">投稿</button>
				</div>
			</div>
		</div>
	</div>

	<script src="/js/apiClient.js"></script>
	<script src="/js/utils.js"></script>
	<script>
		const API_BASE = "http://localhost:8080/api/discussion"
		const gidaiId = document.getElementById("gidai-data").dataset.gidaiId;

		//議題取得メソッド
		async function loadGidaiResponse(gidaiId) {
			const response = await authenticatedFetch(`/api/gidai/${gidaiId}`);
			if (!response.ok) return;
			return await response.json();
		}

		//議題表示method
		function renderGidaiResponse(gidaiResponse) {
			document.getElementById('title').innerText = gidaiResponse.title;
			document.getElementById('body').innerText = gidaiResponse.body;
			document.getElementById('username').innerText = gidaiResponse.userSummary.username
			document.getElementById('date').innerText =
				gidaiResponse.updatedAt
					? `更新日：${formatDateTime(gidaiResponse.updatedAt)}`
					: `登録日：${formatDateTime(gidaiResponse.createdAt)}`;

			// 2. 編集ボタンの制御
			const editBtn = document.getElementById('EditGidaiLink');


			// 自分の投稿かどうかで「表示・非表示」と「リンク先」を切り替える
			if (gidaiResponse.editable == true) {
				editBtn.href = `/view/gidai/update/${gidaiResponse.id}`;
				editBtn.style.display = 'inline-block'; // 自分のなら表示
			} else {
				editBtn.style.display = 'none'; // 他人のなら隠す
			}
		}

		//コメントDOM追加メソッド
		async function appendComment(item) {
			const list = document.getElementById('commentList');
			const div = document.createElement('div');
			//返信取得
			div.className = "list-group-item comment-item";
			div.dataset.commentId = item.id;

			// ★ 届いているデータに合わせて item.liked を使う
			//オプショナルチェーンとNull合体演算子の組み合わせ
			/**
			オプショナルチェーンの役割：null や undefined のときに、undefinedを返しTypeErrorを防ぐ
			?. の結果が undefined や null になったとき、false
			**/
			const isLiked = item.likeResult?.liked ?? false;
			const likeCount = item.likeResult?.likeCount ?? 0;
			//三項演算子
			const btnClass = isLiked ? 'btn-primary' : 'btn-outline-primary';

			//返信HTML生成
			const replies = item.replies ?? [];

			const repliesHTML = replies
				.map(reply => `
							<div class="ms-4 mt-2 border-start ps-3" data-reply-id="${reply.id}">
								<strong>${reply.userSummary.username}</strong>
								<br>${reply.replyComment}
								<br>
								<small>${reply.updatedAt
						? formatDateTime(reply.updatedAt) + ' <span class="badge bg-secondary">編集済み</span>'
						: formatDateTime(reply.createdAt)}
								</small>
								${reply.editable ? `
								<br><button
									type="button"
									class="btn btn-outline-warning btn-sm edit-raply-btn mt-1"
									data-reply-id="${reply.id}">
									<i class="bi bi-pencil-square"></i> 編集
								
								</button>` : ''}
							</div>
							`
				)
				.join('');

			// ★ 返信件数に応じてボタンを出し分け
			const repliesToggleHTML = replies.length > 0 ? `
				    <button class="btn btn-sm btn-outline-secondary toggle-replies-btn mt-2">
				        返信を見る <span class="badge bg-secondary">${replies.length}</span>
				    </button>
				` : '';

			div.innerHTML = `
		    <strong>${item.userSummary.username}</strong>
		    <br><span class="comment-text">${item.comment}</span>
		    <br><small class="comment-datetime">${formatDateTime(item.createdAt)}</small>
			
			<div class="d-flex gap-2 align-items-center">
				<button class="like-toggle-btn btn btn-sm ${btnClass}">
					        👍 いいね <span class="like-count">${likeCount}</span>
				</button>	
				<button 
					type="button" 
					class="btn btn-primary btn-sm reply-btn" 
					data-comment-id="${item.id}"
					data-bs-toggle="modal" 
					data-bs-target="#replyModal">
					<i class="bi bi-chat-dots"></i> 返信
				</button>
				${item.editable ? `
				       <button 
				           type="button" 
				           class="btn btn-outline-warning btn-sm edit-comment-btn" 
				           data-comment-id="${item.id}">
				           <i class="bi bi-pencil-square"></i> 編集
				       </button>` : ''}
			</div>
			
			<!-- ★ トグルボタン -->
			   ${repliesToggleHTML}
			   
			<!-- 返信一覧 -->
			<div class="reply-container" style="display:none;">
			       ${repliesHTML}
			</div>
		   
		    `;

			// ★ トグルイベント登録（DOM追加後に設定）
			const toggleBtn = div.querySelector('.toggle-replies-btn');
			if (toggleBtn) {	// ① トグルボタンが存在する場合のみ処理
				toggleBtn.addEventListener('click', () => {		// ② クリックイベント登録
					const replyContainer = div.querySelector('.reply-container');	// ③ 返信一覧を取得
					const isHidden = replyContainer.style.display === 'none';	// ④ 現在の表示状態を確認

					replyContainer.style.display = isHidden ? 'block' : 'none';	// ⑤ 表示・非表示を切り替え
					// ★ replies.lengthをやめてDOMから毎回カウント
					const currentReplyCount = replyContainer.querySelectorAll('.ms-4').length;
					toggleBtn.innerHTML = isHidden	// ⑥ ボタンのテキストを切り替え
						? `返信を閉じる <span class="badge bg-secondary">${currentReplyCount}</span>`
						: `返信を見る <span class="badge bg-secondary">${currentReplyCount}</span>`;
				});
			}

			console.log(typeof formatDateTime)
			list.prepend(div);
		}
		
		//更新用DOM関数
		function updateCommentInDOM(commentId, data) {
			const commentEl = document.querySelector(`.comment-item[data-comment-id="${commentId}"]`);
			if (!commentEl) {
				console.warn(`comment-id ${commentId} の要素が見つかりません`);
				return;
			}
			
			//本文を差し替え
			const textEl = commentEl.querySelector('.comment-text');
			textEl.textContent = data.comment;
			
			//日時変更を更新
			const dateEl = commentEl.querySelector('.comment-datetime');
			textEl.innerHTML = data.updatedAt
				? `${formatDateTime(data.updatedAt)} <span class="badge bg-secondary">編集済み</span>`
				: formatDateTime(data.createdAt);
		}

		//画面表示時の処理
		document.addEventListener("DOMContentLoaded", async () => {
			const gidaiId = document.getElementById("gidai-data").dataset.gidaiId;
			const [gidaiItemResponse, discussionItemResponses] = await Promise.all([
				loadGidaiResponse(gidaiId),
				loadComments(gidaiId),
			]);

			renderGidaiResponse(gidaiItemResponse);
			discussionItemResponses.forEach(appendComment);

			const modalEl = document.getElementById('commentModal');
			modalEl.addEventListener('shown.bs.modal', () => {
				document.getElementById('modalComment').focus();
			});
		});

		//コメント一覧表示
		async function loadComments(gidaiId) {
			const response = await authenticatedFetch(`${API_BASE}/list/${gidaiId}`);
			if (!response.ok) return [];
			return await response.json();
		}

		// モーダルからコメント投稿
		document.getElementById('submitModalComment').addEventListener("click", async function () {
		    const comment = document.getElementById('modalComment').value;
		    const gidaiId = document.getElementById("gidai-data").dataset.gidaiId;
		    const token = sessionStorage.getItem('accessToken');
		
		    if (!token) {
		        document.getElementById('modalMessage').innerText = "ログインが必要です";
		        return;
		    }
		    if (!comment) {
		        document.getElementById('modalMessage').innerText = "コメントを入力してください";
		        return;
		    }
		
		    // 編集モードかどうかを判定
		    const mode = this.dataset.mode || 'create';
		    const commentId = this.dataset.commentId;
		
		    const url = mode === 'edit'
		        ? `${API_BASE}/update/${commentId}`
		        : `${API_BASE}/save/${gidaiId}`;
		    const method = mode === 'edit' ? 'PUT' : 'POST';
		
		    try {
		        const response = await authenticatedFetch(url, {
		            method: method,
		            headers: {"Content-Type": "application/json"},
		            body: JSON.stringify({comment})
		        });
		        if (!response.ok) throw new Error(mode === 'edit' ? "更新に失敗しました" : "投稿に失敗しました");
		
		        const data = await response.json();
		
		        if (mode === 'edit') {
		            updateCommentInDOM(commentId, data);
		        } else {
		            appendComment(data);
		        }
		
		        document.getElementById('modalComment').value = "";
		        document.getElementById('modalMessage').innerText = "";
		
		        const modal = bootstrap.Modal.getInstance(document.getElementById('commentModal'));
		        modal.hide();
		
		        // モーダルの状態を新規投稿用にリセット
		        document.getElementById('commentModalLabel').textContent = "コメント投稿"; // ← タイポ修正
		        this.textContent = "投稿";
		        delete this.dataset.mode;
		        delete this.dataset.commentId;
		
		    } catch (err) {
		        document.getElementById('modalMessage').innerText = err.message;
		    }
		});
		
		
		//イベント移譲で編集ボタンのclick処理を定義
		//非同期でコメントが投稿されるから
		document.getElementById('commentList').addEventListener('click', (e) => {
		    const btn = e.target.closest('.edit-comment-btn');
		    if (!btn) return;
		
		    const commentId = btn.dataset.commentId;
		
		    const commentEl = document.querySelector(`.comment-item[data-comment-id="${commentId}"]`);
		    const currentText = commentEl.querySelector('.comment-text').textContent;
		
		    document.getElementById('modalComment').value = currentText;
		    document.getElementById('modalMessage').innerText = "";
		
		    document.getElementById('commentModalLabel').textContent = "コメント編集";
		    document.getElementById('submitModalComment').textContent = "更新";
		
		    document.getElementById('submitModalComment').dataset.mode = 'edit';
		    document.getElementById('submitModalComment').dataset.commentId = commentId;
		
		    const modal = bootstrap.Modal.getOrCreateInstance(document.getElementById('commentModal'));
		    modal.show();
		});


		// 返信ボタンクリック時にcommentIdをセット
		document.getElementById('commentList').addEventListener('click', (e) => {
			const btn = e.target.closest('.reply-btn');
			if (btn) {
				currentCommentId = btn.dataset.commentId;
			}
		});

		//返信投稿処理
		document.getElementById('submitModalReply').addEventListener('click', async () => {
			const replyComment = document.getElementById('modalReply').value.trim();

			if (!replyComment) {
				document.getElementById('replyModalMessage').textContent = '返信を入力してください';
				return;
			}

			try {
				const response = await authenticatedFetch(`/api/reply/comment/${currentCommentId}`, {
					method: 'POST',
					headers: {'Content-Type': 'application/json'},
					body: JSON.stringify({replyComment})
				});

				if (!response.ok) throw new Error('投稿失敗');

				const newReply = await response.json();

				// ★ ここで確認
				console.log('newReply =', newReply);
				console.log('currentCommentId =', currentCommentId);

				// ① モーダルを閉じる
				bootstrap.Modal.getInstance(document.getElementById('replyModal')).hide();

				// ② テキストエリアをリセット
				document.getElementById('modalReply').value = '';
				document.getElementById('replyModalMessage').textContent = '';

				// ③ DOMに返信を追加
				appendReply(currentCommentId, newReply);

			} catch (e) {
				document.getElementById('replyModalMessage').textContent = '投稿に失敗しました';
			}
		});

		// ----------------------------------------
		// 返信をDOMに追加
		// ----------------------------------------
		function appendReply(commentId, reply) {
			const commentDiv = document.querySelector(`[data-comment-id="${commentId}"]`);
			if (!commentDiv) return;

			const replyContainer = commentDiv.querySelector('.reply-container');
			const toggleBtn = commentDiv.querySelector('.toggle-replies-btn');

			// 返信HTMLを追加
			const replyDiv = document.createElement('div');
			replyDiv.className = 'ms-4 mt-2 border-start ps-3';
			replyDiv.innerHTML = `
		        <strong>${reply.userSummary.username}</strong>
		        <br>${reply.replyComment}
		        <br><small>${formatDateTime(reply.createdAt)}</small>
		    `;
			replyContainer.appendChild(replyDiv);

			// 返信一覧を開く
			replyContainer.style.display = 'block';

			// トグルボタンのバッジを更新
			const currentCount = replyContainer.querySelectorAll('.ms-4').length;
			if (toggleBtn) {
				toggleBtn.innerHTML = `返信を閉じる <span class="badge bg-secondary">${currentCount}</span>`;
			} else {
				// 返信が初めての場合トグルボタンを新規作成
				const newToggleBtn = document.createElement('button');
				newToggleBtn.className = 'btn btn-sm btn-outline-secondary toggle-replies-btn mt-2';
				newToggleBtn.innerHTML = `返信を閉じる <span class="badge bg-secondary">1</span>`;
				replyContainer.before(newToggleBtn);

				newToggleBtn.addEventListener('click', () => {
					const isHidden = replyContainer.style.display === 'none';
					replyContainer.style.display = isHidden ? 'block' : 'none';
					newToggleBtn.innerHTML = isHidden
						? `返信を閉じる <span class="badge bg-secondary">${replyContainer.querySelectorAll('.ms-4').length}</span>`
						: `返信を見る <span class="badge bg-secondary">${replyContainer.querySelectorAll('.ms-4').length}</span>`;
				});
			}
		}


		// 返信をDOMに追加
		function appendReply(commentId, reply) {
			// 対象コメントのdivを取得
			const commentDiv = document.querySelector(`[data-comment-id="${commentId}"]`);
			if (!commentDiv) return;

			const replyContainer = commentDiv.querySelector('.reply-container');
			const toggleBtn = commentDiv.querySelector('.toggle-replies-btn');

			// 返信HTMLを生成して追加
			const replyDiv = document.createElement('div');
			replyDiv.className = 'ms-4 mt-2 border-start ps-3';
			replyDiv.innerHTML = `
		        <strong>${reply.userSummary.username}</strong>
		        <br>${reply.replyComment}
		        <br><small>${formatDateTime(reply.createdAt)}</small>
		    `;
			replyContainer.appendChild(replyDiv);

			// ④ 返信一覧を開く
			replyContainer.style.display = 'block';

			// ⑤ トグルボタンのバッジを更新
			if (toggleBtn) {
				const currentCount = replyContainer.querySelectorAll('.ms-4').length;
				toggleBtn.innerHTML = `返信を閉じる <span class="badge bg-secondary">${currentCount}</span>`;
			} else {
				// 返信が0件でトグルボタンがなかった場合は新規作成
				const newToggleBtn = document.createElement('button');
				newToggleBtn.className = 'btn btn-sm btn-outline-secondary toggle-replies-btn mt-2';
				newToggleBtn.innerHTML = `返信を閉じる <span class="badge bg-secondary">1</span>`;
				replyContainer.before(newToggleBtn);

				newToggleBtn.addEventListener('click', () => {
					const isHidden = replyContainer.style.display === 'none';
					replyContainer.style.display = isHidden ? 'block' : 'none';
					newToggleBtn.innerHTML = isHidden
						? `返信を閉じる <span class="badge bg-secondary">${replyContainer.querySelectorAll('.ms-4').length}</span>`
						: `返信を見る <span class="badge bg-secondary">${replyContainer.querySelectorAll('.ms-4').length}</span>`;
				});
			}
		}

		//いいねトグル処理関数
		async function toggleStatus(id, btnElement) {
			//二重クリック防止
			btnElement.disabled = true;

			try {
				//1. APIリクエスト
				const response = await authenticatedFetch(`/api/like/toggle/${id}`, {
					method: "POST"
				});
				if (!response.ok) throw new Error('処理に失敗しました');

				//2. サーバーから返ってきた最新のステータスを取得
				const data = await response.json();

				//デバック
				console.log('レスポンス:', data);
				console.log('ボタンの現在のクラス:', btnElement.className);

				if (data.liked) {
					console.log('いいね ON → btn-primary に変更');
					btnElement.classList.remove('btn-outline-primary');
					btnElement.classList.add('btn-primary');
				} else {
					console.log('いいね OFF → btn-outline-primary に変更');
					btnElement.classList.remove('btn-primary');
					btnElement.classList.add('btn-outline-primary');
				}

				console.log('変更後のクラス:', btnElement.className);

				//3. UIのトグル処理
				//いいね数の表示位置の指定のない場合の処理
				const countSpan = btnElement.querySelector('.like-count');
				if (countSpan && data.likeCount !== undefined) {
					countSpan.innerText = data.likeCount;
				}
				//Bootstrapのクラスを入れ替えて色を変える(jsonの仕様によりisLikedをlikedに変更)
				if (data.liked) {
					btnElement.classList.remove('btn-outline-primary');
					btnElement.classList.add('btn-primary');
				} else {
					btnElement.classList.remove('btn-primary');
					btnElement.classList.add('btn-outline-primary');
				}

			} catch (error) {
				console.error('Error:', error);
				alert('ログインが必要か、通信エラーが発生しました。');
			} finally {
				//4. ボタンの再度有効化
				btnElement.disabled = false;
			}
		}

		// ✅ いいねボタンのトグル処理（イベント委譲）
		document.getElementById('commentList').addEventListener('click', (e) => {
			// クリックされた要素の近くに「いいねボタン」があるか判定
			const btn = e.target.closest('.like-toggle-btn');

			if (btn) {
				// ボタンの親（comment-item）からIDを取得
				const commentItem = btn.closest('.comment-item');
				const commentId = commentItem.dataset.commentId;

				// 以前作成した toggleStatus 関数を呼び出す
				// btn を引数に渡すことで、関数内でボタンの色を変えられるようになります
				toggleStatus(commentId, btn);
			}
		});

		//返信投稿処理のためのコメントid取得
		let currentCommentId = null;
		document.getElementById('commentList')
			.addEventListener('click', (e) => {

				const btn = e.target.closest('.reply-btn');

				if (btn) {
					currentCommentId = btn.dataset.commentId;
				}
			});
	</script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
