<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ユーザー登録</title>
	<!-- Bootstrap 5 -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

	<!-- コンテンツ中央寄せ -->
	<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
		<!-- 登録フォームカード -->
		<div class="card shadow p-4" style="width: 100%; max-width: 400px; border-radius: 1rem;">
			<h3 class="text-center mb-4">ユーザー登録</h3>

			<form id="userForm">
				<div class="mb-3">
					<label for="username" class="form-label">名前</label>
					<input type="text" class="form-control" id="username" name="username" placeholder="名前を入力" required>
					<div class="invalid-feedback">2文字以上で入力してください</div>
				</div>

				<div class="mb-3">
					<label for="email" class="form-label">メールアドレス</label>
					<input type="email" class="form-control" id="email" name="email" placeholder="example@mail.com"
						required>
					<div class="invalid-feedback">正しいメール形式で入力してください</div>
				</div>

				<div class="mb-3">
					<label for="password" class="form-label">パスワード</label>
					<input type="password" class="form-control" id="password" name="password" placeholder="パスワードを入力"
						required>
					<div class="invalid-feedback"></div>
				</div>

				<div class="d-grid">
					<button type="button" class="btn btn-primary" onclick="submitForm()">登録</button>
				</div>
			</form>

			<!-- メッセージ表示 -->
			<div id="message" class="mt-3 text-center fw-bold"></div>

			<div class="mt-3 text-center">
				<a href="/view/login" class="text-decoration-none">ログインはこちら</a>
			</div>
		</div>
	</div>

	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

	<script>
		console.log("msg after redirect:", sessionStorage.getItem("successMessage"));

		//バリデーションチェックmethod
		function validateForm(data) {
			if (!data.username || data.username.length < 3 || data.username.length > 30) {
				return "ユーザー名は3〜30文字で入力してください";
			}

			const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
			if (!data.email || !emailRegex.test(data.email)) {
				return "正しいメール形式で入力してください";
			}

			if (!data.password || data.password.length < 8) {
				return "パスワードは8文字以上で入力してください";
			}

			return null;
		}
		
		//エラーメッセージ表示メソッド
		function showMessage(text, isError = true) {
		    const messageDiv = document.getElementById('message');
		    messageDiv.className = `mt-3 text-center fw-bold ${isError ? 'text-danger' : 'text-success'}`;
		    messageDiv.innerText = text;
		}

		async function submitForm() {
			//データ取得
			const data = {
				username: document.getElementById('username').value,
				email: document.getElementById('email').value,
				password: document.getElementById('password').value
			};

			//バリデーション実行
			const error = validateForm(data);

			if (error) {
				showMessage(error.message);
				document.getElementById(error.field).focus(); 
				return;
			}

			//API呼び出し
			try {
				const response = await fetch('/api/users', {
					method: 'POST',
					headers: {'Content-Type': 'application/json'},
					body: JSON.stringify(data)
				});


				if (response.ok) {
					const result = await response.json();
					// メッセージを sessionStorage に保存するだけ
					sessionStorage.setItem('successMessage', "登録成功");
					window.location.href = '/view/login';
				} else {
					// エラーは登録画面で表示する場合は必要
					showMessage(`登録に失敗しました (${response.status})`)
				}
			} catch (error) {
				showMessage('通信エラーが発生しました');
			}
		}
	</script>
</body>

</html>
